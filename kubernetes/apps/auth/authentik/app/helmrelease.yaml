---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
spec:
  interval: 1h
  chart:
    spec:
      chart: authentik
      version: "2026.5.4"
      sourceRef:
        kind: HelmRepository
        name: authentik
  valuesFrom:
    - kind: Secret
      name: authentik-secret
      valuesKey: AUTHENTIK_SECRET_KEY
      targetPath: authentik.secret_key
    - kind: Secret
      name: authentik-secret
      valuesKey: AUTHENTIK_EMAIL__HOST
      targetPath: authentik.email.host
    - kind: Secret
      name: authentik-secret
      valuesKey: AUTHENTIK_EMAIL__USERNAME
      targetPath: authentik.email.username
    - kind: Secret
      name: authentik-secret
      valuesKey: AUTHENTIK_EMAIL__PASSWORD
      targetPath: authentik.email.password
    - kind: Secret
      name: authentik-secret
      valuesKey: AUTHENTIK_EMAIL__FROM
      targetPath: authentik.email.from
    - kind: Secret
      name: authentik-app
      valuesKey: host
      targetPath: authentik.postgresql.host
    - kind: Secret
      name: authentik-app
      valuesKey: username
      targetPath: authentik.postgresql.user
    - kind: Secret
      name: authentik-app
      valuesKey: password
      targetPath: authentik.postgresql.password
    - kind: Secret
      name: authentik-app
      valuesKey: dbname
      targetPath: authentik.postgresql.name
  values:
    server:
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
      ingress:
        enabled: false
      resources:
        requests:
          cpu: 100m
          memory: 768Mi
        limits:
          memory: 1.5Gi
    worker:
      resources:
        requests:
          cpu: 50m
          memory: 512Mi
        limits:
          memory: 1.5Gi
    authentik:
      log_level: info
      email:
        port: 465
        use_ssl: true
    postgresql:
      enabled: false
    redis:
      enabled: true
      global:
        storageClass: ssd-block
    prometheus:
      rules:
        enabled: true
