---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: auth-authentik-bucket
spec:
  interval: 1h
  path: ./kubernetes/apps/auth/authentik/bucket
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../../components/bucket
  postBuild:
    substitute:
      BUCKET: authentik
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: auth-authentik
spec:
  interval: 1h
  path: ./kubernetes/apps/auth/authentik/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../../components/postgres
  dependsOn:
    - name: auth-authentik-bucket
    - name: cnpg-barman-cloud
      namespace: operators
  postBuild:
    substitute:
      APP: authentik
      BUCKET: authentik
    substituteFrom:
      - kind: Secret
        name: authentik
