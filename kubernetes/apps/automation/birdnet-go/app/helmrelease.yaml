---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: birdnet-go
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: birdnet-go
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        runAsNonRoot: true
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      main:
        strategy: Recreate
        containers:
          main:
            image:
              repository: ghcr.io/tphakala/birdnet-go
              tag: nightly-20260601@sha256:d23b5a19c6d88110362de0e4d28c72150c976792fbe7ed90be85625d24a51898
            env:
              TZ: Europe/Amsterdam
    service:
      main:
        controller: main
        ports:
          http:
            port: 8080
    persistence:
      data:
        existingClaim: birdnet-go
        globalMounts:
          - path: /config
            subPath: config
          - path: /data
            subPath: data
    route:
      main:
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - birds.zijlein.de
        rules:
          - backendRefs:
              - identifier: main
                port: 8080
