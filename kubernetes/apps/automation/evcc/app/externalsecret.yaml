---
# evcc reads a single config file and has no native secret/env injection
# (see evcc-io/evcc#6218, #20768 — still open feature requests). So we render
# the whole evcc.yaml as a Secret, pulling the broker + credentials live from
# the pgmqtt-generated evcc-mqtt-credentials secret via the kubernetes-local
# store. The Secret is mounted at /etc/evcc.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: evcc-config
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: SecretStore
    name: kubernetes-local
  target:
    name: evcc-config
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        evcc.yaml: |
          network:
            host: evcc.zijlein.de
            port: 7070
            externalUrl: https://evcc.zijlein.de

          log: info
          interval: 30s

          database:
            type: sqlite
            dsn: /data/evcc.db

          mqtt:
            broker: {{ .mqtt_host }}:{{ .mqtt_port }}
            user: {{ .mqtt_user }}
            password: {{ .mqtt_password }}
            topic: evcc

          # --- Meters --------------------------------------------------------
          # Live power from Home Assistant (Enphase Envoy) via MQTT statestream
          # configured with `base_topic: hass` (kept distinct from evcc's own
          # publish topic above). statestream publishes the raw numeric state,
          # so no jq needed. Grid sign: positive = import, negative = export —
          # the Envoy net-consumption sensor already uses that convention.
          meters:
            - name: grid
              type: custom
              power:
                source: mqtt
                topic: hass/sensor/envoy_122315089977_current_net_power_consumption/state
            - name: pv
              type: custom
              power:
                source: mqtt
                topic: hass/sensor/envoy_122315089977_current_power_production/state

          # --- Charger -------------------------------------------------------
          # OCPP 1.6J. The wallbox connects to
          # ws://10.0.10.102:8887/EVB-P20319295 (internal LBIPAM only).
          # NOTE: the ocpp charger REQUIRES an evcc sponsor token (set below).
          chargers:
            - name: wallbox
              type: ocpp
              stationid: EVB-P20319295
              connector: 1
              # connecttimeout: 5m   # raise if the wallbox reconnects slowly

          # --- Vehicle -------------------------------------------------------
          # No connectivity -> offline template; evcc estimates SoC from
          # charged energy (and OCPP meter values).
          vehicles:
            - name: car
              type: template
              template: offline
              title: Car
              capacity: 50   # kWh usable battery capacity

          site:
            title: Home
            meters:
              grid: grid
              pv:
                - pv

          loadpoints:
            - title: Garage
              charger: wallbox
              vehicle: car
              mode: pv        # charge from PV surplus only
              # phases / min / max current are set in the UI (persisted to the
              # sqlite DB), not here — recent evcc ignores them in yaml.
              # Defaults: 6A min, 16A max, automatic phase detection (the
              # 1-phase car is detected from the OCPP charge meter).

          # Required for the native OCPP charger (evcc gates it behind
          # sponsorship). Trial token from https://sponsor.evcc.io, held in the
          # evcc-sponsor secret. Trial tokens expire — refresh that secret and
          # restart evcc when it does.
          sponsortoken: {{ .sponsor_token }}
  data:
    - secretKey: sponsor_token
      remoteRef:
        key: evcc-sponsor
        property: token
    - secretKey: mqtt_host
      remoteRef:
        key: evcc-mqtt-credentials
        property: host
    - secretKey: mqtt_port
      remoteRef:
        key: evcc-mqtt-credentials
        property: port
    - secretKey: mqtt_user
      remoteRef:
        key: evcc-mqtt-credentials
        property: username
    - secretKey: mqtt_password
      remoteRef:
        key: evcc-mqtt-credentials
        property: password
