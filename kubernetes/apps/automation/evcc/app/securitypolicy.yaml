---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: evcc
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: evcc
  oidc:
    provider:
      issuer: https://auth.bo0tzz.me/application/o/evcc/
    clientIDRef:
      name: evcc-oidc
    clientSecret:
      name: evcc-oidc
    redirectURL: https://evcc.zijlein.de/oauth2/callback
    logoutPath: /oauth2/sign_out
    scopes:
      - openid
      - profile
      - email
