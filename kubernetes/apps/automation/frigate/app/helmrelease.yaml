apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frigate
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: frigate
    namespace: automation
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/blakeblackshear/frigate
              tag: "0.17.1"
            env:
              TZ: Europe/Amsterdam
            resources:
              claims:
                - name: gpu
              requests:
                cpu: 150m
                memory: 1Gi
              limits:
                memory: 1.5Gi
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 5000
              readiness: *probes
    defaultPodOptions:
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: ${APP}-gpu
    service:
      main:
        controller: main
        ports:
          http:
            port: 8971
    route:
      main:
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - camera.zijlein.de
        rules:
          - backendRefs:
              # Route through the KEDA HTTP add-on interceptor (operators ns) so
              # Frigate can scale to zero and wake on demand.
              - kind: Service
                name: keda-add-ons-http-interceptor-proxy
                namespace: operators
                port: 8080
    persistence:
      config:
        existingClaim: ${APP}
        globalMounts:
          - path: /config
      media:
        type: persistentVolumeClaim
        forceRename: frigate-media
        accessMode: ReadWriteOnce
        size: 20Gi
        storageClass: ssd-block
        globalMounts:
          - path: /media/frigate
      cache:
        type: emptyDir
        globalMounts:
          - path: /tmp/cache
      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
        globalMounts:
          - path: /dev/shm
