---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: automation-frigate
spec:
  interval: 1h
  path: ./kubernetes/apps/automation/frigate/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../../components/gpu
    - ../../../../components/bucket
    - ../../../../components/volsync
  postBuild:
    substitute:
      APP: frigate
      BUCKET: frigate
      GPU_CEL: 'device.attributes["gpu.intel.com"].pciId == "0x46a6"'
