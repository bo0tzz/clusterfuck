---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: automation-frigate
spec:
  interval: 1h
  path: ./kubernetes/apps/automation/frigate/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: keda-add-ons-http
      namespace: operators
  components:
    - ../../../../components/gpu
    - ../../../../components/bucket
    - ../../../../components/volsync
  postBuild:
    substitute:
      APP: frigate
      BUCKET: frigate
      GPU_CEL: 'device.attributes["gpu.intel.com"].pciId == "0x46a6"'
      # Frigate 0.17 runs as root and writes /config/.jwt_secret mode 0600;
      # mover needs uid 0 to read it. Non-root support is planned for 0.19.
      VOLSYNC_PUID: "0"
      VOLSYNC_PGID: "0"
