---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: lan
spec:
  config: |-
    {
      "cniVersion": "0.3.1",
      "name": "lan",
      "plugins": [
        {
          "type": "macvlan",
          "master": "trunk.1",
          "mode": "bridge",
          "ipam": {
            "type": "static",
            "addresses": [
              { "address": "192.168.178.250/24" }
            ]
          }
        }
      ]
    }
