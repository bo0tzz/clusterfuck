---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: automation
resources:
  - ocirepository.yaml
  - helmrelease.yaml
patches:
  - target:
      group: postgresql.cnpg.io
      kind: Cluster
    # pgmqtt state is reconstructable from client reconnects; backups + WAL
    # archiving aren't worth the B2 bandwidth.
    patch: |-
      - op: remove
        path: /spec/bootstrap/recovery
      - op: remove
        path: /spec/bootstrap/initdb/import
      - op: remove
        path: /spec/plugins
  - target:
      group: postgresql.cnpg.io
      kind: ScheduledBackup
    patch: |-
      $patch: delete
      apiVersion: postgresql.cnpg.io/v1
      kind: ScheduledBackup
      metadata:
        name: _
  - target:
      group: postgresql.cnpg.io
      kind: Backup
    patch: |-
      $patch: delete
      apiVersion: postgresql.cnpg.io/v1
      kind: Backup
      metadata:
        name: _
  - target:
      group: barmancloud.cnpg.io
      kind: ObjectStore
    patch: |-
      $patch: delete
      apiVersion: barmancloud.cnpg.io/v1
      kind: ObjectStore
      metadata:
        name: _
