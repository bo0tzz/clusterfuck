---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: automation-pgmqtt
spec:
  interval: 1h
  path: ./kubernetes/apps/automation/pgmqtt/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../../components/postgres
  postBuild:
    substitute:
      APP: pgmqtt
