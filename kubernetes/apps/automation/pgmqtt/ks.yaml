---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: automation-pgmqtt-bucket
spec:
  interval: 1h
  path: ./kubernetes/apps/automation/pgmqtt/bucket
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../../components/bucket
  postBuild:
    substitute:
      BUCKET: pgmqtt
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: automation-pgmqtt
spec:
  interval: 1h
  path: ./kubernetes/apps/automation/pgmqtt/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../../components/postgres
  dependsOn:
    - name: automation-pgmqtt-bucket
    - name: cnpg-barman-cloud
      namespace: operators
  postBuild:
    substitute:
      APP: pgmqtt
      BUCKET: pgmqtt
    substituteFrom:
      - kind: Secret
        name: pgmqtt
