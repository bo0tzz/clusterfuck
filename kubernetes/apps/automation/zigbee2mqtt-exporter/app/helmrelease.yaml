---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zigbee2mqtt-exporter
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: zigbee2mqtt-exporter
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        runAsNonRoot: true
    controllers:
      main:
        strategy: RollingUpdate
        containers:
          main:
            image:
              repository: ghcr.io/kpetremann/mqtt-exporter
              tag: "1.12.1"
            env:
              MAX_METRICS: "0"
              MQTT_TOPIC: "zigbee2mqtt/#"
              MQTT_V5_PROTOCOL: "True"
              PROMETHEUS_PORT: "80"
              PROMETHEUS_PREFIX: zigbee2mqtt_
              ZIGBEE2MQTT_AVAILABILITY: "True"
              MQTT_ADDRESS:
                valueFrom:
                  secretKeyRef:
                    name: zigbee2mqtt-exporter-mqtt-credentials
                    key: host
              MQTT_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: zigbee2mqtt-exporter-mqtt-credentials
                    key: username
              MQTT_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: zigbee2mqtt-exporter-mqtt-credentials
                    key: password
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi
    service:
      main:
        controller: main
        ports:
          http:
            port: 80
    serviceMonitor:
      main:
        serviceName: zigbee2mqtt-exporter
        endpoints:
          - port: http
            interval: 30s
            path: /metrics
