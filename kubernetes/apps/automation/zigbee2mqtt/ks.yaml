---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: automation-zigbee2mqtt-bucket
spec:
  interval: 1h
  path: ./kubernetes/apps/automation/zigbee2mqtt/bucket
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../../components/bucket
  postBuild:
    substitute:
      BUCKET: zigbee2mqtt
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: automation-zigbee2mqtt-migration
spec:
  interval: 1h
  path: ./kubernetes/apps/automation/zigbee2mqtt/migration
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  postBuild:
    substitute:
      APP: zigbee2mqtt
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: automation-zigbee2mqtt
spec:
  interval: 1h
  path: ./kubernetes/apps/automation/zigbee2mqtt/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: automation-zigbee2mqtt-bucket
    - name: automation-pgmqtt
  postBuild:
    substitute:
      APP: zigbee2mqtt
      BUCKET: zigbee2mqtt
