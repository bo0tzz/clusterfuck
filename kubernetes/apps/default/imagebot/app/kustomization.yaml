---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - ./ocirepository.yaml
  - ./helmrelease.yaml
  - ./secret.sops.yaml
patches:
  - target:
      kind: PersistentVolumeClaim
    # dataSourceRef is immutable post-creation; patch retained because reverting it errors.
    patch: |-
      - op: replace
        path: /spec/dataSourceRef
        value:
          kind: PersistentVolumeClaim
          name: ${APP}-migration
