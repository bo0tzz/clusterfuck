---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: default-imagebot-bucket
spec:
  interval: 1h
  path: ./kubernetes/apps/default/imagebot/bucket
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../../components/bucket
  postBuild:
    substitute:
      BUCKET: imagebot
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: default-imagebot
spec:
  interval: 1h
  path: ./kubernetes/apps/default/imagebot/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: default-imagebot-bucket
  postBuild:
    substitute:
      APP: imagebot
      BUCKET: imagebot
      VOLSYNC_CAPACITY: 1Gi
