---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minecraft
spec:
  interval: 1h
  chart:
    spec:
      chart: minecraft
      version: "5.1.3"
      sourceRef:
        kind: HelmRepository
        name: itzg-minecraft
  values:
    podSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      runAsNonRoot: true
      fsGroup: 568
      fsGroupChangePolicy: OnRootMismatch
    image:
      pullPolicy: Always
    resources:
      requests:
        cpu: 100m
        memory: 2Gi
      limits:
        memory: 4Gi
    minecraftServer:
      eula: "TRUE"
      version: "26.1.2"
      whitelist: Dylan_rengers,bo0tzz
      ops: Dylan_rengers,bo0tzz
      maxWorldSize: 29999984
      spawnProtection: 0
      pvp: true
      memory: 3000M
      serviceType: LoadBalancer
      rcon:
        enabled: true
      type: "FABRIC"
      modrinth:
        projects: ["worldedit"]
    # top-level (chart 5.1.3 ignores minecraftServer.serviceAnnotations)
    serviceAnnotations:
      lbipam.cilium.io/ips: "10.0.10.105"
      external-dns.alpha.kubernetes.io/hostname: mc.bo0tzz.me
      external-dns.alpha.kubernetes.io/target: "45.142.19.143"
    persistence:
      dataDir:
        enabled: true
        existingClaim: minecraft
