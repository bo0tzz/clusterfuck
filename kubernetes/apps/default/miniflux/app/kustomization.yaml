---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - ocirepository.yaml
  - helmrelease.yaml
  - secret.sops.yaml
patches:
  - target:
      group: postgresql.cnpg.io
      kind: Cluster
    patch: |-
      - op: remove
        path: /spec/bootstrap/initdb
      - op: replace
        path: /spec/instances
        value: 1
      - op: add
        path: /spec/enablePDB
        value: false
      - op: remove
        path: /spec/postgresql/synchronous
