---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - ocirepository.yaml
  - helmrelease.yaml
patches:
  - target:
      group: postgresql.cnpg.io
      kind: Cluster
    patch: |-
      - op: remove
        path: /spec/bootstrap/recovery
      - op: replace
        path: /spec/bootstrap/initdb/import/databases
        value: [vaultwarden]
  - target:
      kind: PersistentVolumeClaim
    # dataSourceRef is immutable post-creation; patch retained because reverting it errors.
    patch: |-
      - op: replace
        path: /spec/dataSourceRef
        value:
          kind: PersistentVolumeClaim
          name: volsync-${APP}-migration-dest
