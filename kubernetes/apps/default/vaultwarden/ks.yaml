---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: default-vaultwarden-bucket
spec:
  interval: 1h
  path: ./kubernetes/apps/default/vaultwarden/bucket
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../../components/bucket
  postBuild:
    substitute:
      BUCKET: vaultwarden
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: default-vaultwarden
spec:
  interval: 1h
  path: ./kubernetes/apps/default/vaultwarden/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../../components/postgres
    - ../../../../components/volsync
  dependsOn:
    - name: default-vaultwarden-bucket
    - name: cnpg-barman-cloud
      namespace: operators
  postBuild:
    substitute:
      APP: vaultwarden
      BUCKET: vaultwarden
      VOLSYNC_CAPACITY: 1Gi
    substituteFrom:
      - kind: Secret
        name: vaultwarden
