---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: default-vaultwarden-bucket
spec:
  interval: 1h
  path: ./kubernetes/apps/default/vaultwarden/bucket
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../../components/bucket
  postBuild:
    substitute:
      BUCKET: vaultwarden
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: default-vaultwarden-migration
spec:
  interval: 1h
  path: ./kubernetes/apps/default/vaultwarden/migration
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  healthCheckExprs:
    - apiVersion: volsync.backube/v1alpha1
      kind: ReplicationDestination
      current: has(status.lastManualSync) && status.lastManualSync == 'restore-once'
      inProgress: has(status.conditions) && status.conditions.exists(c, c.type == 'Synchronizing' && c.status == 'True')
  postBuild:
    substitute:
      APP: vaultwarden
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: default-vaultwarden
spec:
  interval: 1h
  path: ./kubernetes/apps/default/vaultwarden/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../../components/postgres
    - ../../../../components/volsync
  dependsOn:
    - name: default-vaultwarden-bucket
    - name: default-vaultwarden-migration
    - name: cnpg-barman-cloud
      namespace: operators
  postBuild:
    substitute:
      APP: vaultwarden
      BUCKET: vaultwarden
      VOLSYNC_CAPACITY: 1Gi
    substituteFrom:
      - kind: Secret
        name: vaultwarden
