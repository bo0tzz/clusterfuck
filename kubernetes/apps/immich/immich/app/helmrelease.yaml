---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: immich
  values:
    valkey:
      enabled: true
      controllers:
        main:
          containers:
            main:
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 64Mi

    immich:
      metrics:
        enabled: true
      persistence:
        library:
          existingClaim: immich

    defaultPodOptions:
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        runAsNonRoot: true
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      main:
        containers:
          main:
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - NET_RAW
            env:
              MACHINE_LEARNING_PRELOAD__CLIP__TEXTUAL: "ViT-H-14-378-quickgelu__dfn5b"
              DB_HOSTNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-app
                    key: host
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-app
                    key: username
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-app
                    key: password
              DB_DATABASE_NAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-app
                    key: dbname
              LOG_LEVEL: verbose
              TZ: Europe/Amsterdam
            image:
              # renovate: datasource=github-releases depName=immich-app/immich
              tag: "v2.7.5"

    server:
      defaultPodOptions:
        resourceClaims:
          - name: gpu
            resourceClaimTemplateName: immich-gpu
      controllers:
        main:
          containers:
            main:
              resources:
                claims:
                  - name: gpu
                requests:
                  cpu: 100m
                  memory: 1.5Gi
                limits:
                  memory: 3Gi
      route:
        main:
          parentRefs:
            - name: envoy-external
              namespace: network
          hostnames:
            - photos.bo0tzz.me
          rules:
            - backendRefs:
                - identifier: main
                  port: 2283

    machine-learning:
      defaultPodOptions:
        resourceClaims:
          - name: gpu
            resourceClaimTemplateName: immich-ml-gpu
      controllers:
        main:
          strategy: Recreate
          containers:
            main:
              image:
                tag: v2.7.5-openvino
              env:
                GUNICORN_CMD_ARGS: "--no-control-socket"
              resources:
                claims:
                  - name: gpu
                requests:
                  cpu: 100m
                  memory: 8Gi
      persistence:
        cache:
          type: persistentVolumeClaim
          accessMode: ReadWriteMany
          size: 10Gi
          storageClass: ssd-fs
