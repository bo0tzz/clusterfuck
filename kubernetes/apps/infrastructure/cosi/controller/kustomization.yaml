---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cosi-system
resources:
  - https://github.com/kubernetes-sigs/container-object-storage-interface?ref=v0.2.2
patches:
  - target:
      kind: Namespace
      name: container-object-storage-system
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Namespace
      metadata:
        name: container-object-storage-system
