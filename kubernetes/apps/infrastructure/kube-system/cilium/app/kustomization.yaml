apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-system
resources:
  - ./helmrelease.yaml
  - ./ocirepository.yaml
  - ./lbipam.yaml
  - ./dashboards.yaml
configMapgenerator:
  - name: cilium-values
    files:
      - ./values.yaml
    options:
      disableNameSuffixHash: true
      labels:
        reconcile.fluxcd.io/watch: Enabled
