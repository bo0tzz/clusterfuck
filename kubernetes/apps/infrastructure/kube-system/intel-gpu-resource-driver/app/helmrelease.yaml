apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-gpu-resource-driver
spec:
  chartRef:
    kind: OCIRepository
    name: intel-gpu-resource-driver
  interval: 1h
  values:
    cdi:
      staticPath: /var/cdi/static
      dynamicPath: /var/cdi/dynamic
    # Ships a NodeFeatureRule (labels Intel-GPU nodes) and scopes the kubelet
    # plugin to it via NFD.
    nodeFeatureRules:
      enabled: true
