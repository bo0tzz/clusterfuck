apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: multi-networkpolicy
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: multi-networkpolicy
  values:
    defaultPodOptions:
      # controller talks to the API via in-cluster config — needs its SA token mounted
      automountServiceAccountToken: true
      hostNetwork: true
      nodeSelector:
        kubernetes.io/arch: amd64
      tolerations:
        - operator: Exists
          effect: NoSchedule
    controllers:
      main:
        type: daemonset
        serviceAccount:
          identifier: main
        containers:
          app:
            image:
              repository: ghcr.io/k8snetworkplumbingwg/multi-networkpolicy-iptables
              tag: snapshot@sha256:eb21e1ef309b7531a09e029431cae2bed16ced5948901aab7a7853c8f89573e6
            command:
              - /usr/bin/multi-networkpolicy-iptables
            args:
              # Talos uses containerd, not the upstream CRI-O default
              - --host-prefix=/host
              - --container-runtime-endpoint=/run/containerd/containerd.sock
              - --pod-iptables=/var/lib/multi-networkpolicy/iptables
            securityContext:
              privileged: true
              capabilities:
                add:
                  - SYS_ADMIN
                  - NET_ADMIN
            resources:
              requests:
                cpu: 100m
                memory: 80Mi
              limits:
                memory: 150Mi
    serviceAccount:
      main: {}
    rbac:
      roles:
        main:
          type: ClusterRole
          rules:
            - apiGroups: ["k8s.cni.cncf.io"]
              resources: ["*"]
              verbs: ["*"]
            - apiGroups: [""]
              resources: ["pods", "namespaces"]
              verbs: ["list", "watch", "get"]
            - apiGroups: ["networking.k8s.io"]
              resources: ["networkpolicies"]
              verbs: ["watch", "list"]
            - apiGroups: ["", "events.k8s.io"]
              resources: ["events"]
              verbs: ["create", "patch", "update"]
      bindings:
        main:
          type: ClusterRoleBinding
          roleRef:
            identifier: main
          subjects:
            - identifier: main
    persistence:
      host:
        type: hostPath
        hostPath: /
        globalMounts:
          - path: /host
      var-lib:
        type: hostPath
        hostPath: /var/lib/multi-networkpolicy
        globalMounts:
          - path: /var/lib/multi-networkpolicy
