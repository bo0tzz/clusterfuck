---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: multi-networkpolicy-crd
spec:
  interval: 1h
  url: https://github.com/k8snetworkplumbingwg/multi-networkpolicy
  ref:
    commit: a6d2c547f9f9dc756d285e7015fc32f7b6793f76
  ignore: |
    /*
    !/scheme.yml
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: multi-networkpolicy-crd
spec:
  interval: 1h
  path: ./
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: multi-networkpolicy-crd
  healthChecks:
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: multi-networkpolicies.k8s.cni.cncf.io
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: multi-networkpolicy
spec:
  interval: 1h
  path: ./kubernetes/apps/infrastructure/kube-system/multi-networkpolicy/app
  prune: true
  wait: false
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: multi-networkpolicy-crd
  healthChecks:
    - apiVersion: apps/v1
      kind: DaemonSet
      name: multi-networkpolicy
      namespace: kube-system
