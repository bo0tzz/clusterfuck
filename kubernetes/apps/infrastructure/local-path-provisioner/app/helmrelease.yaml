---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-path-provisioner
spec:
  chartRef:
    kind: OCIRepository
    name: local-path-provisioner
  interval: 1h
  values:
    nodePathMap:
      - node: DEFAULT_PATH_FOR_NON_LISTED_NODES
        paths:
          - /var/mnt/local-path-provisioner
    storageClass:
      create: true
      defaultClass: false
      name: local-path
      reclaimPolicy: Delete
