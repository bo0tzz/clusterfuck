---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph
spec:
  chartRef:
    kind: OCIRepository
    name: rook-ceph
  interval: 1h
  values:
    monitoring:
      enabled: true

    csi:
      cephFSKernelMountOptions: ms_mode=prefer-crc
      enableLiveness: true
    image:
      repository: ghcr.io/rook/ceph
    resources:
      requests:
        cpu: 200m
        memory: 320Mi
      limits:
        memory: 512Mi
