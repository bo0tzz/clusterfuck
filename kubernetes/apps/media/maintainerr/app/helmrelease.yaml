apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: maintainerr
  namespace: media
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: maintainerr
    namespace: media
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/maintainerr/maintainerr
              tag: 3.11.1@sha256:11fa7153bb4100b92f0b14509dbbd8921097fc6afd0ed7a5babf41a76c78bad4
            env:
              TZ: Europe/Amsterdam
            securityContext:
              runAsUser: 568
              runAsGroup: 568
              runAsNonRoot: true
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 6246
              readiness: *probes
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 1000Mi
    defaultPodOptions:
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
    service:
      main:
        controller: main
        ports:
          http:
            port: *port
    route:
      main:
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - maintainerr.next.bo0tzz.me
    persistence:
      config:
        existingClaim: maintainerr-config
        globalMounts:
          - path: /opt/data
