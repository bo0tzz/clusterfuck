apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: maintainerr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: maintainerr
    namespace: media
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/maintainerr/maintainerr
              tag: 3.15.1@sha256:fc23686db8c34f6383f0c4e900f1db64d5c73a8191f8554dc983e2e3fe91a7d5
            env:
              TZ: Europe/Amsterdam
            securityContext:
              runAsUser: 568
              runAsGroup: 568
              runAsNonRoot: true
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 6246
              readiness: *probes
            resources:
              requests:
                cpu: 25m
                memory: 320Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
    service:
      main:
        controller: main
        ports:
          http:
            port: *port
    route:
      main:
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - maintainerr.next.bo0tzz.me
    persistence:
      config:
        existingClaim: maintainerr-config
        globalMounts:
          - path: /opt/data
