apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: maintainerr
  namespace: media
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: maintainerr
    namespace: media
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/maintainerr/maintainerr
              tag: 3.1.0@sha256:6c994bb7fd0dbe22deb008478bc6b35f2a8f2bb12412f6157a935d6c8842bd11
            env:
              TZ: Europe/Amsterdam
            securityContext:
              runAsUser: 568
              runAsGroup: 568
              runAsNonRoot: true
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 6767
              readiness: *probes
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 1000Mi
    defaultPodOptions:
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
    service:
      main:
        controller: main
        ports:
          http:
            port: 6246
    route:
      main:
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - maintainerr.next.bo0tzz.me
    persistence:
      config:
        existingClaim: maintainerr-config
        globalMounts:
          - path: /opt/data
