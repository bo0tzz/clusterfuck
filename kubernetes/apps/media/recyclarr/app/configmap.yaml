apiVersion: v1
kind: ConfigMap
metadata:
  name: recyclarr-config
  namespace: media
data:
  recyclarr.yml: |
    sonarr:
      tv:
        base_url: http://sonarr.media.svc.cluster.local:8989
        api_key: !env_var SONARR__AUTH__APIKEY
        quality_definition:
          type: series
        quality_profiles:
          - trash_id: 72dae194fc92bf828f32cde7744e51a1  # WEB-1080p
            reset_unmatched_scores:
              enabled: true
    
    radarr:
      movies:
        base_url: http://radarr.media.svc.cluster.local:7878
        api_key: !env_var RADARR__AUTH__APIKEY
        quality_definition:
          type: movie
        quality_profiles:
          - trash_id: d1d67249d3890e49bc12e275d989a7e9  # HD Bluray + WEB
            reset_unmatched_scores:
              enabled: true
