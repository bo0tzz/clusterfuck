apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: recyclarr
  namespace: media
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: recyclarr
    namespace: media
  values:
    controllers:
      main:
        type: cronjob
        cronjob:
          schedule: "@daily"
          successfulJobsHistory: 1
          failedJobsHistory: 1
        containers:
          main:
            image:
              repository: ghcr.io/recyclarr/recyclarr
              tag: "7.4.1"
            args:
              - sync
            env:
              TZ: Europe/Amsterdam
            envFrom:
              - secretRef:
                  name: sonarr-secret
              - secretRef:
                  name: radarr-secret
            securityContext:
              runAsUser: 568
              runAsGroup: 568
              runAsNonRoot: true
    defaultPodOptions:
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
    persistence:
      config:
        type: configMap
        name: recyclarr-config
        globalMounts:
          - path: /config/recyclarr.yml
            subPath: recyclarr.yml
