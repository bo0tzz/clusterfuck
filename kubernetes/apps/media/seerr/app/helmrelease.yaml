apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seerr
  namespace: media
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: seerr
    namespace: media
  values:
    image:
      repository: ghcr.io/seerr-team/seerr
      tag: "3.1.0"
    env:
      TZ: Europe/Amsterdam
    persistence:
      config:
        enabled: true
        existingClaim: seerr-config
        mountPath: /app/config
    ingress:
      main:
        enabled: false
    route:
      main:
        enabled: true
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - seerr.next.bo0tzz.me
        rules:
          - backendRefs:
              - identifier: main
                port: 5055
