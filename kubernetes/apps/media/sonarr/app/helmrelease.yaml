apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sonarr
  namespace: media
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: sonarr
    namespace: media
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/home-operations/sonarr
              tag: "4.0.16"
            env:
              TZ: Europe/Amsterdam
            envFrom:
              - secretRef:
                  name: sonarr-secret
            securityContext:
              runAsUser: 568
              runAsGroup: 568
              runAsNonRoot: true
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: 8989
              readiness: *probes
    defaultPodOptions:
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
    service:
      main:
        controller: main
        ports:
          http:
            port: 8989
    route:
      main:
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - sonarr.next.bo0tzz.me
        rules:
          - backendRefs:
              - identifier: main
                port: 8989
    persistence:
      config:
        existingClaim: sonarr-config
        globalMounts:
          - path: /config
      media:
        existingClaim: media-library
        globalMounts:
          - path: /media
