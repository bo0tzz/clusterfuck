---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: alertmanager-to-github
spec:
  interval: 1h
  path: ./kubernetes/apps/monitoring/alertmanager-to-github/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
