---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: drm-exporter
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: drm-exporter
  values:
    fullnameOverride: drm-exporter
    # Device access comes from the Intel GPU DRA driver (the admin-access
    # ResourceClaimTemplate + postRenderer below), NOT a hostPath. A plain
    # hostPath-mounted /dev/dri is visible but blocked by the cgroup-v2 device
    # controller for a non-privileged container; DRA/CDI injects the device
    # nodes *with* the cgroup allow rule, so the exporter runs unprivileged.
    # devCpu="" too: the Talos kernel has CONFIG_X86_MSR unset (upstream declines
    # on security grounds), so the MSR path (Intel iGPU package temp + RAPL power
    # fallback) is unavailable. /sys is still mounted by the chart for freq/mem/
    # hwmon stats.
    hostAccess:
      devDri: ""
      devCpu: ""
    # Drop SYS_RAWIO (only used for the unavailable MSR path); keep PERFMON for
    # the Intel i915/xe engine-utilization perf PMU.
    securityContext:
      capabilities:
        add: [PERFMON]
    config:
      logLevel: info
    monitoring:
      serviceMonitor:
        enabled: true
        relabelings:
          - sourceLabels: [__meta_kubernetes_endpoint_node_name]
            targetLabel: nodename
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
          matchLabels:
            dashboards: grafana
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi
      # Container side of the DRA claim wired up by the postRenderer below.
      claims:
        - name: gpu
    # Only janky (Arc Pro B50) and tiny (i9-12900H Iris Xe) have a GPU; wonky has
    # none. Both run the xe driver (kernel 6.18 >= the 6.16 xe perf-PMU floor).
    # Scoping avoids a permanently-Pending DaemonSet pod on wonky (no GPU device
    # for the claim to allocate). TODO: switch to an NFD GPU label once NFD lands.
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values: [janky, tiny]
  # The chart's DaemonSet template has no pod-level resourceClaims field, so
  # inject the DRA claim that references the admin-access ResourceClaimTemplate.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: DaemonSet
              name: drm-exporter
            patch: |
              - op: add
                path: /spec/template/spec/resourceClaims
                value:
                  - name: gpu
                    resourceClaimTemplateName: drm-exporter-gpu
