---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: drm-exporter
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: drm-exporter
  values:
    fullnameOverride: drm-exporter
    # /dev/dri comes from the DRA claim (not a hostPath — that's cgroup-blocked
    # for a non-privileged container); no MSR on Talos (CONFIG_X86_MSR unset).
    hostAccess:
      devDri: ""
      devCpu: ""
    securityContext:
      capabilities:
        add: [PERFMON]
    config:
      logLevel: info
    monitoring:
      serviceMonitor:
        enabled: true
        relabelings:
          - sourceLabels: [__meta_kubernetes_endpoint_node_name]
            targetLabel: nodename
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
          matchLabels:
            dashboards: grafana
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi
      claims:
        - name: gpu
    nodeSelector:
      intel.feature.node.kubernetes.io/gpu: "true"
  # Chart has no pod-level resourceClaims field; inject the DRA claim.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: DaemonSet
              name: drm-exporter
            patch: |
              - op: add
                path: /spec/template/spec/resourceClaims
                value:
                  - name: gpu
                    resourceClaimTemplateName: drm-exporter-gpu
