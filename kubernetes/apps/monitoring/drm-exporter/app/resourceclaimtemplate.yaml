---
# admin-access monitor claim: read access to all GPU devices on the node, not
# counted as consumed (doesn't steal VFs). Needs the namespace's
# resource.kubernetes.io/admin-access=true label.
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: drm-exporter-gpu
spec:
  spec:
    devices:
      requests:
        - name: all-gpus
          exactly:
            deviceClassName: gpu.intel.com
            adminAccess: true
            allocationMode: All
            tolerations:
              - effect: NoExecute
              - effect: NoSchedule
