---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: main
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folderRef: manual
  resyncPeriod: 30s
  configMapRef:
    name: dashboard-main
    key: dashboard.json
