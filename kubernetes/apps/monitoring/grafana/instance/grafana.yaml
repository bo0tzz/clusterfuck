---
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  labels:
    dashboards: grafana
spec:
  config:
    server:
      root_url: https://monitoring.zijlein.de
    auth.generic_oauth:
      enabled: "true"
      name: Authentik
      icon: signin
      scopes: openid profile email
      auth_url: https://auth.bo0tzz.me/application/o/authorize/
      token_url: https://auth.bo0tzz.me/application/o/token/
      api_url: https://auth.bo0tzz.me/application/o/userinfo/
      role_attribute_path: contains(groups[*], 'Admins') && 'Admin' || contains(groups[*], 'Editors') && 'Editor' || 'Viewer'
  disableDefaultAdminSecret: true
  persistentVolumeClaim:
    spec:
      accessModes:
        - ReadWriteOnce
      storageClassName: ssd-block
      resources:
        requests:
          storage: 5Gi
  deployment:
    spec:
      strategy:
        type: Recreate
      template:
        spec:
          securityContext:
            fsGroup: 472
          volumes:
            - name: grafana-data
              persistentVolumeClaim:
                claimName: grafana-pvc
          containers:
            - name: grafana
              resources:
                requests:
                  cpu: 50m
                  memory: 256Mi
                limits:
                  memory: 512Mi
              env:
                - name: GF_SECURITY_ADMIN_USER
                  valueFrom:
                    secretKeyRef:
                      name: grafana-admin-credentials
                      key: GF_SECURITY_ADMIN_USER
                - name: GF_SECURITY_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: grafana-admin-credentials
                      key: GF_SECURITY_ADMIN_PASSWORD
                - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: grafana-oauth
                      key: client_id
                - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: grafana-oauth
                      key: client_secret