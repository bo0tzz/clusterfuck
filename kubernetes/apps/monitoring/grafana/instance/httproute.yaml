---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
  hostnames:
    - monitoring.next.zijlein.de
  rules:
    - backendRefs:
        - name: grafana-service
          port: 3000
