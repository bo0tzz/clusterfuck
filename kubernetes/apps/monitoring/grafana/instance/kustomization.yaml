---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
resources:
  - grafana-admin.sops.yaml
  - grafana.yaml
  - grafanadashboard.yaml
  - httproute.yaml
  - dashboards/home.yaml
configMapGenerator:
  - name: dashboard-home
    files:
      - dashboard.json=dashboards/home.json
generatorOptions:
  disableNameSuffixHash: true
