---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
resources:
  - grafana-admin.sops.yaml
  - grafana.yaml
  - grafanadashboard.yaml
  - httproute.yaml
  - dashboards/folder.yaml
  - dashboards/home.yaml
  - dashboards/apc-ups.yaml
  - dashboards/main.yaml
configMapGenerator:
  - name: dashboard-home
    files:
      - dashboard.json=dashboards/home.json
  - name: dashboard-apc-ups
    files:
      - dashboard.json=dashboards/apc-ups.json
  - name: dashboard-main
    files:
      - dashboard.json=dashboards/main.json
generatorOptions:
  disableNameSuffixHash: true
