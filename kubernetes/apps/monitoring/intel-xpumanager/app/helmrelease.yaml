---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: xpumd
spec:
  chartRef:
    kind: OCIRepository
    name: xpumd
  interval: 1h
  values:
    image:
      tag: v2.0.0-rc.0
      pullPolicy: IfNotPresent
    gpuAccess: dra
    prometheus:
      monitor: true
    grafana:
      dashboards: true
      namespace: monitoring
  postRenderers:
    # Chart 2.0.0-rc.0 has `appVersion: xpumd/v2.0.0-rc.0` (slash is invalid in label values),
    # which it stamps into `app.kubernetes.io/version` on every resource. Overwrite it.
    - kustomize:
        patches:
          - target:
              name: ^(xpumd|xpumd-config)$
            patch: |
              - op: add
                path: /metadata/labels/app.kubernetes.io~1version
                value: 2.0.0-rc.0
