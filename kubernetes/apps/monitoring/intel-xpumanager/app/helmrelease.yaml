---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: xpumd
spec:
  chartRef:
    kind: OCIRepository
    name: xpumd
  interval: 1h
  values:
    image:
      tag: v2.0.0-rc.0
      pullPolicy: IfNotPresent
    resourcesOverride:
      requests:
        cpu: 10m
        memory: 192Mi
      limits:
        memory: 384Mi
    gpuAccess: dra
    # Scoped to tiny only:
    # - janky: xpumd v2 L0 sysman fails (ReBAR off, BIOS-side; tracking)
    # - wonky: no Intel GPU; chart's ResourceClaimTemplate (allocationMode: All) can't allocate -> Pending forever
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values: [tiny]
    prometheus:
      monitor: true
    # Chart 2.0.0-rc.0 configures the `prometheus` exporter but does not include it in any
    # pipeline, so nothing actually listens on :8080. Add it to the metrics pipeline.
    config:
      service:
        pipelines:
          metrics:
            receivers: [intelxpu]
            processors: [intelxpustatus]
            exporters: [intelxpuinfo, prometheus]
    grafana:
      dashboards: true
      namespace: monitoring
  postRenderers:
    # Chart 2.0.0-rc.0 has `appVersion: xpumd/v2.0.0-rc.0` (slash is invalid in label values),
    # which it stamps into `app.kubernetes.io/version` on the 4 resources that carry the
    # full label set. ResourceClaimTemplate/ServiceMonitor don't carry that label.
    - kustomize:
        patches:
          - target:
              kind: ^(ServiceAccount|ConfigMap|Service|DaemonSet)$
              name: ^xpumd(-config)?$
            patch: |
              - op: replace
                path: /metadata/labels/app.kubernetes.io~1version
                value: 2.0.0-rc.0
