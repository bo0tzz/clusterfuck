---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shelly-exporter
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: shelly-exporter
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/cimnine/shelly-openmetrics-exporter
              tag: v0.4.5
            resources:
              requests:
                cpu: 10m
                memory: 16Mi
              limits:
                memory: 32Mi
    service:
      main:
        controller: main
        ports:
          http:
            port: 54901
    serviceMonitor:
      main:
        serviceName: shelly-exporter
        endpoints:
          - port: http
            scheme: http
            path: /probe
            interval: 30s
            scrapeTimeout: 10s
            params:
              target: ["192.168.178.8"]
            metricRelabelings:
              - action: labeldrop
                regex: (pod)
