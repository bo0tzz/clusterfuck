---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: snmp-exporter
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: prometheus-snmp-exporter
  values:
    fullnameOverride: snmp-exporter
    resources:
      requests:
        cpu: 10m
        memory: 48Mi
      limits:
        memory: 96Mi
    serviceMonitor:
      enabled: true
      interval: 30s
      scrapeTimeout: 30s
      params:
        - name: apc-ups
          target: 10.0.0.3
          module: [apcups]
