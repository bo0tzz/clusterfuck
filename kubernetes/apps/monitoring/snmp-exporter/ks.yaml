---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: snmp-exporter
spec:
  interval: 1h
  path: ./kubernetes/apps/monitoring/snmp-exporter/app
  prune: true
