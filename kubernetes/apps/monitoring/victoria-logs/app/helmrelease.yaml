---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-logs-single
  interval: 1h
  values:
    server:
      retentionPeriod: 30d
      persistentVolume:
        enabled: true
        existingClaim: victoria-logs
      vmServiceScrape:
        enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 320Mi
        limits:
          memory: 768Mi
    vector:
      enabled: true
      resources:
        requests:
          cpu: 25m
          memory: 128Mi
        # No memory limit: the rare mon cluster-log re-emit can briefly need
        # well over 384Mi to read through the backlog; a cgroup cap just OOM-loops
        # it (see incident 2026-06-06). Uncapped so it can recover; monitor usage.
    dashboards:
      enabled: true
      grafanaOperator:
        enabled: true
        spec:
          instanceSelector:
            matchLabels:
              dashboards: grafana
          allowCrossNamespaceImport: true
