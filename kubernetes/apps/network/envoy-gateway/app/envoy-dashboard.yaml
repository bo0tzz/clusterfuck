---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: envoy-global
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folderRef: manual
  resyncPeriod: 30s
  configMapRef:
    name: grafana-dashboards
    key: envoy-proxy-global.json
