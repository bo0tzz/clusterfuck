---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: bo0tzz-me-production
spec:
  secretName: bo0tzz-me-production-tls
  dnsNames:
    - "bo0tzz.me"
    - "*.bo0tzz.me"
    - "*.next.bo0tzz.me"
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
---
