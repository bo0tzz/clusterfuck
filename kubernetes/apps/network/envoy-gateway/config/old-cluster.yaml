---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: old-cluster
spec:
  endpoints:
    - ip:
        address: 192.168.4.100
        port: 443
---
apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name: old-cluster
spec:
  targetRefs:
    - group: gateway.envoyproxy.io
      kind: Backend
      name: old-cluster
  validation:
    hostname: bo0.tz
    wellKnownCACertificates: System
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: old-cluster
spec:
  parentRefs:
    - name: envoy-external
      sectionName: https
  rules:
    - backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: old-cluster
