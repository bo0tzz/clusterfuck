---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: old-cluster
  namespace: network
spec:
  endpoints:
    - ip:
        address: 192.168.4.100
        port: 443
  tls:
    wellKnownCACertificates: System
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: old-cluster
  namespace: network
spec:
  parentRefs:
    - name: envoy-external
      sectionName: https
  rules:
    - backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: old-cluster
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: old-cluster
  namespace: network
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: old-cluster
  circuitBreaker:
    maxRequestsPerConnection: 1
