---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
spec:
  chartRef:
    kind: OCIRepository
    name: external-dns
  interval: 1h
  values:
    provider:
      name: cloudflare
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-api-token
            key: api-token
    extraArgs:
      - --cloudflare-dns-records-per-page=1000
      - --crd-source-apiversion=externaldns.k8s.io/v1alpha1
      - --crd-source-kind=DNSEndpoint
      - --migrate-from-txt-owner=default
    policy: upsert-only
    sources: ["crd", "gateway-httproute", "service"]
    txtOwnerId: clusterfuck
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi