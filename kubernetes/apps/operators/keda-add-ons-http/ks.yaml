---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: keda-add-ons-http
spec:
  interval: 1h
  path: ./kubernetes/apps/operators/keda-add-ons-http/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: keda
  wait: true
