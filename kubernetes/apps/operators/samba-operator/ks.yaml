---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: samba-operator-source
spec:
  interval: 1h
  path: ./kubernetes/apps/operators/samba-operator/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: samba-operator
spec:
  interval: 1h
  path: ./config/default
  prune: true
  sourceRef:
    kind: GitRepository
    name: samba-operator
    namespace: flux-system
  dependsOn:
    - name: samba-operator-source
  wait: true
  images:
    - name: gcr.io/kubebuilder/kube-rbac-proxy
      newName: quay.io/brancz/kube-rbac-proxy
      newTag: v0.22.0
