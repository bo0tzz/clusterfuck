---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: actual
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: actual
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        runAsNonRoot: true
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      main:
        strategy: Recreate
        containers:
          main:
            image:
              repository: ghcr.io/actualbudget/actual-server
              tag: "26.5.2"
            env:
              ACTUAL_LOGIN_METHOD: openid
              ACTUAL_MULTIUSER: "true"
              ACTUAL_OPENID_DISCOVERY_URL: https://auth.bo0tzz.me/application/o/actual/.well-known/openid-configuration
              ACTUAL_OPENID_SERVER_HOSTNAME: https://actual.bo0tzz.me
            envFrom:
              - secretRef:
                  name: actual-oidc
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 256Mi
    service:
      main:
        controller: main
        ports:
          http:
            port: 5006
    persistence:
      data:
        existingClaim: actual
        globalMounts:
          - path: /data
    route:
      main:
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - actual.bo0tzz.me
        rules:
          - backendRefs:
              - identifier: main
                port: 5006
