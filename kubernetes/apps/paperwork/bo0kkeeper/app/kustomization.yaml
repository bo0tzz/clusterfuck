---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: paperwork
resources:
  - ./ocirepository.yaml
  - ./helmrelease.yaml
  - ./secret.sops.yaml
patches:
  - target:
      group: postgresql.cnpg.io
      kind: Cluster
    patch: |-
      - op: remove
        path: /spec/bootstrap/recovery
      - op: remove
        path: /spec/bootstrap/initdb/import
