---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: actions-runner
spec:
  dependsOn:
    - name: actions-runner-controller
      namespace: actions-controller
  interval: 1h
  path: ./kubernetes/apps/sandbox/actions-runner/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
