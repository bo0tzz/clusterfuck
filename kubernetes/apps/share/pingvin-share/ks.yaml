---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: share-pingvin-share-bucket
spec:
  interval: 1h
  path: ./kubernetes/apps/share/pingvin-share/bucket
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../../components/bucket
  postBuild:
    substitute:
      BUCKET: pingvin-share
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: share-pingvin-share-migration
spec:
  interval: 1h
  path: ./kubernetes/apps/share/pingvin-share/migration
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  postBuild:
    substitute:
      APP: pingvin-share
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: share-pingvin-share
spec:
  interval: 1h
  path: ./kubernetes/apps/share/pingvin-share/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: share-pingvin-share-bucket
  postBuild:
    substitute:
      APP: pingvin-share
      BUCKET: pingvin-share
      VOLSYNC_CAPACITY: 100Gi
