---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zipline
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: zipline
  values:
    controllers:
      main:
        strategy: Recreate
        containers:
          main:
            image:
              repository: ghcr.io/diced/zipline
              tag: "4.6.1"
            env:
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: zipline-app
                    key: uri
              CORE_RETURN_HTTPS_URLS: "true"
              DATASOURCE_TYPE: local
              DATASOURCE_LOCAL_DIRECTORY: /data
              FILES_DEFAULT_FORMAT: random
              FILES_MAX_FILE_SIZE: 10gb
              URLS_ROUTE: /z
            envFrom:
              - secretRef:
                  name: zipline-secret
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 5m
                memory: 256Mi
              limits:
                memory: 512Mi
    service:
      main:
        controller: main
        ports:
          http:
            port: 3000
    route:
      main:
        parentRefs:
          - name: envoy-external
            namespace: network
        hostnames:
          - bo0.tz
        rules:
          - backendRefs:
              - identifier: main
                port: 3000
    persistence:
      data:
        existingClaim: zipline
        globalMounts:
          - path: /data
