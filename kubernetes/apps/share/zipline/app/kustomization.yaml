---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: share
resources:
  - ./ocirepository.yaml
  - ./helmrelease.yaml
  - ./secret.sops.yaml
patches:
  - target:
      group: postgresql.cnpg.io
      kind: Cluster
    patch: |-
      - op: remove
        path: /spec/bootstrap/initdb
      - op: replace
        path: /spec/instances
        value: 1
      - op: add
        path: /spec/enablePDB
        value: false
      - op: remove
        path: /spec/postgresql/synchronous
  - target:
      kind: PersistentVolumeClaim
    # dataSourceRef is immutable post-creation; patch retained because reverting it errors.
    # Note: rsync-TLS mover names its dest PVC volsync-<RD>-dst (restic/kopia/rclone use -dest).
    patch: |-
      - op: replace
        path: /spec/dataSourceRef
        value:
          kind: PersistentVolumeClaim
          name: volsync-${APP}-migration-dst
