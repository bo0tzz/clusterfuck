---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gotosocial
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: gotosocial
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        runAsNonRoot: true
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      main:
        strategy: Recreate
        containers:
          main:
            image:
              repository: docker.io/superseriousbusiness/gotosocial
              tag: "0.22.1"
            envFrom:
              - secretRef:
                  name: gotosocial-oidc
            env:
              TZ: Europe/Amsterdam
              GTS_HOST: gts.bo0.tz
              GTS_ACCOUNT_DOMAIN: bo0.tz
              GTS_ADVANCED_RATE_LIMIT_REQUESTS: "0"
              GTS_STORAGE_LOCAL_BASE_PATH: /storage
              GTS_SEMAPHORE_URL: https://phanpy.bo0.tz
              GTS_LANDING_PAGE_USER: "me"
              GTS_OIDC_ENABLED: "true"
              GTS_OIDC_IDP_NAME: "Authentik"
              GTS_DB_TYPE: postgres
              GTS_DB_POSTGRES_CONNECTION_STRING:
                valueFrom:
                  secretKeyRef:
                    name: gotosocial-app
                    key: uri
            resources:
              requests:
                cpu: 50m
                memory: 768Mi
              limits:
                memory: 1.5Gi
    service:
      main:
        controller: main
        ports:
          http:
            port: 8080
    persistence:
      storage:
        existingClaim: gotosocial
        globalMounts:
          - path: /storage
    route:
      main:
        parentRefs:
          - name: envoy-external
            namespace: network
        hostnames:
          - gts.bo0.tz
        rules:
          - backendRefs:
              - identifier: main
                port: 8080
      wellknown:
        parentRefs:
          - name: envoy-external
            namespace: network
        hostnames:
          - bo0.tz
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /.well-known/
            backendRefs:
              - identifier: main
                port: 8080
