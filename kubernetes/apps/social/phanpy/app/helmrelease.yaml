---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: phanpy
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: phanpy
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        runAsNonRoot: true
    controllers:
      main:
        strategy: RollingUpdate
        containers:
          main:
            image:
              repository: ghcr.io/jjgadgets/phanpy
              tag: "2026.06.23.05dcc55@sha256:178a857ba5f3d12664e5bee15a617958b8799d81dbda36662276362268c5e42f"
            env:
              PHANPY_WEBSITE: phanpy.bo0.tz
              PHANPY_DEFAULT_INSTANCE: gts.bo0.tz
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi
    service:
      main:
        controller: main
        ports:
          http:
            port: 8080
    route:
      main:
        parentRefs:
          - name: envoy-external
            namespace: network
        hostnames:
          - phanpy.bo0.tz
        rules:
          - backendRefs:
              - identifier: main
                port: 8080
