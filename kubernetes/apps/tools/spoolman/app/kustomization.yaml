---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tools
resources:
  - ./ocirepository.yaml
  - ./helmrelease.yaml
patches:
  - target:
      group: postgresql.cnpg.io
      kind: Cluster
    patch: |-
      - op: remove
        path: /spec/bootstrap/recovery
      - op: replace
        path: /spec/bootstrap/initdb/import/databases
        value: [spoolman]
