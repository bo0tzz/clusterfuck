---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tools-spoolman-bucket
spec:
  interval: 1h
  path: ./kubernetes/apps/tools/spoolman/bucket
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../../components/bucket
  postBuild:
    substitute:
      BUCKET: spoolman
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tools-spoolman
spec:
  interval: 1h
  path: ./kubernetes/apps/tools/spoolman/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  components:
    - ../../../../components/postgres
  dependsOn:
    - name: tools-spoolman-bucket
    - name: cnpg-barman-cloud
      namespace: operators
  postBuild:
    substitute:
      APP: spoolman
      BUCKET: spoolman
    substituteFrom:
      - kind: Secret
        name: spoolman
