apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: stirling-pdf
  namespace: tools
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: stirling-pdf
    namespace: tools
  values:
    controllers:
      main:
        strategy: RollingUpdate
        containers:
          main:
            image:
              repository: ghcr.io/stirling-tools/s-pdf
              tag: "2.10.1"
            env:
              SYSTEM_ENABLEANALYTICS: "false"
            resources:
              limits:
                cpu: 150m
                memory: 512Mi
    service:
      main:
        controller: main
        ports:
          http:
            port: 8080
    route:
      main:
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - pdf.bo0tzz.me
        rules:
          - backendRefs:
              - identifier: main
                port: 8080
