---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: kubernetes-local
spec:
  provider:
    kubernetes:
      # Rewritten by the kustomization.yaml replacement to the consuming
      # namespace's name. ESO's kubernetes provider defaults remoteNamespace
      # to "default" (not the SecretStore's own ns), so it must be set.
      remoteNamespace: replaced-by-component
      server:
        url: https://kubernetes.default.svc
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: eso-kubernetes-local
