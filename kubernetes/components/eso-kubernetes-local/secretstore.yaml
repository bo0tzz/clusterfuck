---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: kubernetes-local
spec:
  provider:
    kubernetes:
      server:
        url: https://kubernetes.default.svc
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: eso-kubernetes-local
