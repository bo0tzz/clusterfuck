---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: ${APP}-gpu
  annotations:
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  spec:
    devices:
      requests:
        - name: gpu
          exactly:
            deviceClassName: gpu.intel.com
            selectors:
              # Never claim a parent PF — always leave it to its VFs.
              # TODO: switch to `type == "vf"` (driver >=0.11.0) once every GPU is SR-IOV'd (incl. the B50s); today this also covers bare non-SR-IOV GPUs.
              - cel:
                  expression: device.attributes["gpu.intel.com"].sriov == false
              # Default `1==1` is a CEL always-true expression. A naive default
              # of `true` doesn't survive kustomize: the YAML serializer drops
              # the single quotes, Flux substitute replaces `${GPU_CEL:=true}`
              # with bare `true`, and the k8s API rejects it because
              # cel.expression is typed string (got bool). `1==1` is a plain
              # YAML scalar that CEL evaluates to true.
              - cel:
                  expression: ${GPU_CEL:=1==1}
