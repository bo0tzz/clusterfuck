[tools]
flux2 = "2.8.8"
gh = "2.95.0"
kubectl = "1.36.1"
talhelper = "3.1.11"
talosctl = "1.13.4"
usage = "3.5.2"
helmfile = "1.5.5"
helm = "4.2.2"
yamlfmt = "0.21.0"
"github:home-operations/flate" = "v0.4.9"

[tasks."talos:genconfig"]
dir = "talos"
run = "talhelper genconfig"
outputs = ["talos/clusterconfig"]

[tasks."talos:apply"]
dir = "talos"
depends = ["talos:genconfig"]
confirm = "Are you sure you want to apply the talos config to all nodes?"
run = "talhelper gencommand apply | bash"

[tasks."talos:bootstrap-k8s"]
dir = "talos"
depends = ["talos:genconfig"]
run = """
KUBECONFIG=$(mktemp)
trap 'rm -f "$KUBECONFIG"' EXIT
talhelper gencommand kubeconfig --extra-flags - | bash > "$KUBECONFIG"
helmfile --kubeconfig "$KUBECONFIG" --file '{{ config_root }}/bootstrap/helmfile.yaml' sync
"""

[tasks."kube:fmt"]
run = "yamlfmt ."
description = "Format kubernetes manifests"

[tasks."kube:diff"]
description = "Diff kubernetes resources against main"
run = "flate diff all --path ./kubernetes/flux/cluster"
